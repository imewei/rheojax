name: CI (disabled)

on:
  workflow_dispatch:  # Temporarily disabled; manual dispatch only

jobs:
  lint:
    if: ${{ false }}  # CI temporarily disabled
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync

    - name: Run Black
      run: uv run black --check rheojax tests

    - name: Run Ruff
      run: uv run ruff check rheojax tests

    - name: Run MyPy
      run: uv run mypy rheojax --ignore-missing-imports --no-strict-optional

  quality:
    if: ${{ false }}  # CI temporarily disabled
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync
        uv pip install "radon>=6.0.0"

    - name: Check cyclomatic complexity (max D-rating allowed)
      run: |
        echo "Checking for high complexity functions (D or worse)..."
        # Count D-rated or worse functions (lines starting with M/F/C for methods/functions/classes)
        HIGH_COMPLEXITY=$(uv run radon cc rheojax -nb --min D 2>/dev/null | grep -E "^    [MFC]" | wc -l || echo "0")
        echo "Found $HIGH_COMPLEXITY high-complexity functions"
        # Allow up to 10 D-rated functions during transition period
        if [ "$HIGH_COMPLEXITY" -gt 10 ]; then
          echo "::error::Too many high-complexity functions ($HIGH_COMPLEXITY > 10)"
          uv run radon cc rheojax -nb --min D
          exit 1
        fi
        echo "Complexity check passed"

    - name: Check maintainability index (min B-rating)
      run: |
        echo "Checking maintainability index..."
        # Count files with C or worse maintainability
        LOW_MI=$(uv run radon mi rheojax -s 2>/dev/null | grep -E '\- [CD]' | grep -c "^" || echo "0")
        echo "Found $LOW_MI files with low maintainability"
        if [ "$LOW_MI" -gt 2 ]; then
          echo "::error::Too many low-maintainability files ($LOW_MI > 2)"
          uv run radon mi rheojax -s | grep -E '\- [CD]'
          exit 1
        fi
        echo "Maintainability check passed"

  test:
    if: ${{ false }}  # CI temporarily disabled
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync

    - name: Run smoke tests (~1366 critical tests, ~2-5 min per job)
      run: |
        uv run pytest -n 4 -v --timeout=120 --dist=loadscope \
          --cov=rheojax --cov-report=xml --cov-report=term-missing \
          -m "smoke"
        # Note: Only smoke tests (~1366/4122 tests) run on every commit
        # Fast tier (~3500 tests): pytest -n 4 -m "not slow and not validation and not benchmark and not notebook_comprehensive"
        # Full validation suite: pytest -n 4 (run locally before releases)

    - name: Check minimum coverage threshold
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      run: |
        # Extract coverage percentage from pytest output
        COVERAGE=$(python -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('coverage.xml')
        root = tree.getroot()
        line_rate = float(root.attrib.get('line-rate', 0))
        print(int(line_rate * 100))
        ")
        echo "Current smoke test coverage: ${COVERAGE}%"
        # Minimum threshold: 30% for smoke tests
        if [ "$COVERAGE" -lt 30 ]; then
          echo "::error::Coverage ${COVERAGE}% is below minimum threshold of 30%"
          exit 1
        fi
        echo "Coverage check passed (${COVERAGE}% >= 30%)"

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  docs:
    if: ${{ false }}  # CI temporarily disabled
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync
        uv pip install -r docs/requirements-docs.txt

    - name: Build documentation
      run: |
        uv run sphinx-build -b html docs/source docs/build

    - name: Upload documentation artifacts
      uses: actions/upload-artifact@v4
      with:
        name: docs
        path: docs/build/

  build:
    if: ${{ false }}  # CI temporarily disabled
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Build package
      run: uv build

    - name: Check package with twine
      run: |
        uv pip install "twine>=6.0.0"
        uv run twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.python-version }}
        path: dist/

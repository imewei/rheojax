name: Release to PyPI (disabled)

on:
  workflow_dispatch:  # Temporarily disabled; manual dispatch only

permissions:
  contents: read

jobs:
  # Run full test suite before publishing
  test:
    if: ${{ false }}  # Release pipeline temporarily disabled
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true  # Stop on first failure for releases
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync

    - name: Run smoke tests (~1366 critical tests, ~2-5 min per job)
      timeout-minutes: 10
      run: |
        uv run pytest -n 4 -v --timeout=120 --dist=loadscope \
          --cov=rheojax --cov-report=xml --cov-report=term-missing \
          -m "smoke"
        # Note: Only smoke tests (~1366/4122 tests) run on release CI
        # Full validation suite should be run locally before creating release: make test

  # Run linting checks
  lint:
    if: ${{ false }}  # Release pipeline temporarily disabled
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync

    - name: Run Black
      run: uv run black --check rheojax tests

    - name: Run Ruff
      run: uv run ruff check rheojax tests

    - name: Run MyPy
      run: uv run mypy rheojax --ignore-missing-imports --no-strict-optional

  # Build documentation to ensure it works
  docs:
    if: ${{ false }}  # Release pipeline temporarily disabled
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync
        uv pip install -r docs/requirements-docs.txt

    - name: Build documentation
      run: |
        uv run sphinx-build -W -b html docs/source docs/build

  # Build and publish to PyPI (only after all tests pass)
  publish:
    name: Publish to PyPI
    if: ${{ false }}  # Release pipeline temporarily disabled
    needs: [test, lint, docs]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rheojax
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Build package
      run: uv build

    - name: Verify package metadata
      run: |
        uv pip install "twine>=6.0.0"
        uv run twine check dist/*

    - name: Verify version matches release tag
      run: |
        # Extract version from pyproject.toml
        PACKAGE_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        # Extract version from git tag (remove 'v' prefix if present)
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        TAG_VERSION=${TAG_VERSION#refs/tags/}

        echo "Package version: $PACKAGE_VERSION"
        echo "Git tag version: $TAG_VERSION"

        if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
          echo "Error: Package version ($PACKAGE_VERSION) does not match git tag ($TAG_VERSION)"
          exit 1
        fi

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
        verbose: true

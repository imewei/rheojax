name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync

    - name: Run Black
      run: uv run black --check rheojax tests

    - name: Run Ruff
      run: uv run ruff check rheojax tests

    - name: Run MyPy
      continue-on-error: true
      run: uv run mypy rheojax --ignore-missing-imports --no-strict-optional

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync
        uv pip install "radon>=6.0.0"

    - name: Check cyclomatic complexity (max D-rating allowed)
      run: |
        echo "Checking for high complexity functions (D or worse)..."
        HIGH_COMPLEXITY=$(uv run radon cc rheojax --min D 2>/dev/null | grep -E "^    [MFC]" | wc -l || echo "0")
        echo "Found $HIGH_COMPLEXITY high-complexity functions"
        if [ "$HIGH_COMPLEXITY" -gt 100 ]; then
          echo "::error::Too many high-complexity functions ($HIGH_COMPLEXITY > 100)"
          uv run radon cc rheojax --min D
          exit 1
        fi
        echo "::notice::Complexity check passed ($HIGH_COMPLEXITY high-complexity functions)"

    - name: Check maintainability index (min B-rating)
      run: |
        echo "Checking maintainability index..."
        LOW_MI=$(uv run radon mi rheojax -s 2>/dev/null | grep -E '\- [CD]' | grep -c "^" || echo "0")
        echo "Found $LOW_MI files with low maintainability"
        if [ "$LOW_MI" -gt 10 ]; then
          echo "::error::Too many low-maintainability files ($LOW_MI > 10)"
          uv run radon mi rheojax -s | grep -E '\- [CD]'
          exit 1
        fi
        echo "Maintainability check passed"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
    - name: Dependency Review
      uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: high
        comment-summary-in-pr: always

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install PySide6 system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1-mesa libegl1 libxkbcommon-x11-0 libxcb-xinerama0 libgl1-mesa-glx libopengl0

    - name: Install dependencies
      run: uv sync

    - name: Run smoke tests
      shell: bash
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        uv run pytest -n 4 -v --timeout=120 --dist=loadscope \
          --cov=rheojax --cov-report=xml --cov-report=term-missing \
          -m "smoke"

    - name: Check minimum coverage threshold
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      env:
        MIN_COVERAGE: '30'
      run: |
        COVERAGE=$(uv run python -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('coverage.xml')
        print(int(float(tree.getroot().attrib.get('line-rate', 0)) * 100))
        ")
        echo "Current smoke test coverage: ${COVERAGE}%"
        if [ "$COVERAGE" -lt "$MIN_COVERAGE" ]; then
          echo "::error::Coverage ${COVERAGE}% is below minimum threshold of ${MIN_COVERAGE}%"
          exit 1
        fi
        echo "::notice::Coverage check passed (${COVERAGE}% >= ${MIN_COVERAGE}%)"

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync

    - name: Build documentation
      run: uv run sphinx-build -b html docs/source docs/build

    - name: Upload documentation artifacts
      uses: actions/upload-artifact@v4
      with:
        name: docs
        path: docs/build/

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Build package
      run: uv build

    - name: Check package with twine
      run: |
        uv pip install "twine>=6.0.0"
        uv run twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.python-version }}
        path: dist/

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync

    - name: Audit dependencies
      continue-on-error: true
      run: |
        uv pip install "pip-audit>=2.7.0"
        uv run pip-audit --requirement <(uv export --no-dev --no-emit-project)

name: Release to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.12
    - name: Install dependencies
      run: uv sync
    - name: Run Black
      run: uv run black --check rheojax tests
    - name: Run Ruff
      run: uv run ruff check rheojax tests

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.12
    - name: Install PySide6 system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libopengl0 libxkbcommon-x11-0 libxcb-xinerama0 libxcb-cursor0
    - name: Install dependencies
      run: uv sync
    - name: Run smoke tests
      shell: bash
      env:
        QT_QPA_PLATFORM: offscreen
      run: |
        uv run pytest -n 4 -v --timeout=120 --dist=loadscope \
          -m "smoke"

  publish:
    name: Publish to PyPI
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/rheojax
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Verify version matches release tag
      env:
        GIT_REF: ${{ github.ref }}
      run: |
        PACKAGE_VERSION=$(uv run python -c "
        try:
            import tomllib
        except ImportError:
            import tomli as tomllib
        with open('pyproject.toml', 'rb') as f:
            print(tomllib.load(f)['project']['version'])
        ")
        TAG_VERSION="${GIT_REF#refs/tags/v}"
        echo "Package version: $PACKAGE_VERSION"
        echo "Git tag version: $TAG_VERSION"
        if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
          echo "::error::Package version ($PACKAGE_VERSION) does not match git tag ($TAG_VERSION)"
          exit 1
        fi

    - name: Build package
      run: uv build

    - name: Verify package metadata
      run: uvx twine check dist/*

    - name: Generate build provenance attestation
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: 'dist/*'

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
        verbose: true
        attestations: true

    - name: Generate SBOM
      continue-on-error: true
      run: |
        uv sync
        uvx cyclonedx-py environment -o sbom.json --output-format json

    - name: Generate changelog from commits
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREV_TAG" ]; then
          git log --pretty=format:"- %s (%h)" --no-merges HEAD > changelog.md
        else
          git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD" > changelog.md
        fi

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ github.ref_name }}
      run: |
        ASSETS=(dist/*)
        [ -f sbom.json ] && ASSETS+=(sbom.json)
        gh release create "$TAG_NAME" \
          --title "RheoJAX $TAG_NAME" \
          --notes-file changelog.md \
          "${ASSETS[@]}"

    - name: Upload SBOM artifact
      if: hashFiles('sbom.json') != ''
      uses: actions/upload-artifact@v7
      with:
        name: sbom
        path: sbom.json

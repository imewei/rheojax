name: Release to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync

    - name: Run smoke tests
      timeout-minutes: 10
      run: |
        uv run pytest -n 4 -v --timeout=120 --dist=loadscope \
          --cov=rheojax --cov-report=xml --cov-report=term-missing \
          -m "smoke"

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync

    - name: Run Black
      run: uv run black --check rheojax tests

    - name: Run Ruff
      run: uv run ruff check rheojax tests

    - name: Run MyPy
      run: uv run mypy rheojax --ignore-missing-imports --no-strict-optional

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync
        uv pip install -r docs/requirements-docs.txt

    - name: Build documentation
      run: uv run sphinx-build -W -b html docs/source docs/build

  publish:
    name: Publish to PyPI
    needs: [test, lint, docs]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rheojax
    permissions:
      id-token: write
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Build package
      run: uv build

    - name: Verify package metadata
      run: |
        uv pip install "twine>=6.0.0"
        uv run twine check dist/*

    - name: Verify version matches release tag
      env:
        GIT_REF: ${{ github.ref }}
      run: |
        PACKAGE_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        TAG_VERSION=${GIT_REF#refs/tags/v}
        TAG_VERSION=${TAG_VERSION#refs/tags/}
        echo "Package version: $PACKAGE_VERSION"
        echo "Git tag version: $TAG_VERSION"
        if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
          echo "Error: Package version ($PACKAGE_VERSION) does not match git tag ($TAG_VERSION)"
          exit 1
        fi

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
        verbose: true

    - name: Generate SBOM
      run: |
        uv pip install "cyclonedx-bom>=5.0.0"
        uv run cyclonedx-py environment --output sbom.json --output-format json

    - name: Generate changelog from commits
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREV_TAG" ]; then
          git log --pretty=format:"- %s (%h)" --no-merges HEAD > changelog.md
        else
          git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD" > changelog.md
        fi

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ github.ref_name }}
      run: |
        gh release create "$TAG_NAME" \
          --title "RheoJAX $TAG_NAME" \
          --notes-file changelog.md \
          dist/* sbom.json

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.json

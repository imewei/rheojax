name: Release to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    name: CI Gates
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to PyPI
    needs: [ci]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/rheojax
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Verify version matches release tag
      env:
        GIT_REF: ${{ github.ref }}
      run: |
        PACKAGE_VERSION=$(uv run python -c "
        try:
            import tomllib
        except ImportError:
            import tomli as tomllib
        with open('pyproject.toml', 'rb') as f:
            print(tomllib.load(f)['project']['version'])
        ")
        TAG_VERSION="${GIT_REF#refs/tags/v}"
        echo "Package version: $PACKAGE_VERSION"
        echo "Git tag version: $TAG_VERSION"
        if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
          echo "::error::Package version ($PACKAGE_VERSION) does not match git tag ($TAG_VERSION)"
          exit 1
        fi

    - name: Build package
      run: uv build

    - name: Verify package metadata
      run: uvx twine check dist/*

    - name: Generate build provenance attestation
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: 'dist/*'

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true
        verbose: true
        attestations: true

    - name: Generate SBOM
      run: |
        uv pip install "cyclonedx-bom>=5.0.0"
        uv run cyclonedx-py environment --output sbom.json --output-format json

    - name: Generate changelog from commits
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREV_TAG" ]; then
          git log --pretty=format:"- %s (%h)" --no-merges HEAD > changelog.md
        else
          git log --pretty=format:"- %s (%h)" --no-merges "${PREV_TAG}..HEAD" > changelog.md
        fi

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ github.ref_name }}
      run: |
        gh release create "$TAG_NAME" \
          --title "RheoJAX $TAG_NAME" \
          --notes-file changelog.md \
          dist/* sbom.json

    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.json

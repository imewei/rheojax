version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    # Ignore major version bumps for critical dependencies — these need manual migration
    ignore:
      - dependency-name: "pandas"
        update-types: ["version-update:semver-major"]
      - dependency-name: "arviz"
        update-types: ["version-update:semver-major"]
      - dependency-name: "arviz-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jax"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jaxlib"
        update-types: ["version-update:semver-major"]
      - dependency-name: "numpyro"
        update-types: ["version-update:semver-major"]
      - dependency-name: "numpy"
        update-types: ["version-update:semver-major"]
      - dependency-name: "scipy"
        update-types: ["version-update:semver-major"]
    groups:
      jax-ecosystem:
        patterns:
          - "jax"
          - "jaxlib"
          - "interpax"
          - "diffrax"
          - "nlsq"
        update-types:
          - "minor"
          - "patch"
      bayesian:
        patterns:
          - "numpyro"
          - "arviz*"
          - "xarray"
        update-types:
          - "minor"
          - "patch"
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "black"
          - "mypy"
          - "sphinx*"
          - "furo"
          - "myst-parser*"
          - "pre-commit"
          - "hypothesis"
        update-types:
          - "minor"
          - "patch"
      gui:
        patterns:
          - "PySide6"
          - "pyqtgraph"
          - "qtpy"
          - "qasync"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"

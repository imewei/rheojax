version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    # Ignore major version bumps for critical dependencies — these need manual migration
    ignore:
      - dependency-name: "pandas"
        update-types: ["version-update:semver-major"]
      - dependency-name: "arviz"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jax"
        update-types: ["version-update:semver-major"]
      - dependency-name: "numpyro"
        update-types: ["version-update:semver-major"]
    groups:
      dev-dependencies:
        patterns:
          - "pytest*"
          - "ruff"
          - "black"
          - "mypy"
          - "sphinx*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"

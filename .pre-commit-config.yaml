# Pre-commit hooks for code quality
# Install with: pre-commit install
# Run manually: pre-commit run --all-files
#
# Note: Hook versions are pinned to ensure reproducibility.
# Update periodically with: pre-commit autoupdate

ci:
  autoupdate_schedule: monthly
  autoupdate_commit_msg: "chore(deps): pre-commit autoupdate"
  autofix_commit_msg: "style: pre-commit autofix"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: ^(?:examples|graphify-out)/
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements
      - id: mixed-line-ending
      - id: name-tests-test
        args: ['--pytest-test-first']
        exclude: ^tests/(fixtures/|gui/visual/)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        additional_dependencies: []
        args: [--ignore-missing-imports, --no-strict-optional]
        exclude: ^(tests/|docs/|examples/)

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: (uv\.lock|\.ipynb)$

  - repo: local
    hooks:
      - id: notebook-execution-consistency
        name: Notebook execution consistency
        description: >-
          Flags committed notebooks where fit/quality cells are unexecuted
          while the rest of the notebook has executed cells (silent-skip
          pattern). Notebooks with all code cells cleared are skipped.
        entry: >-
          python scripts/check_notebook_execution.py
          --allowlist scripts/notebook_execution_baseline.txt
        language: system
        files: \.ipynb$
        pass_filenames: true

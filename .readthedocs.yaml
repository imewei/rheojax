# Read the Docs configuration file for RheoJAX
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version and other tools
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

# Build documentation in the "docs/" directory with Sphinx
sphinx:
  configuration: docs/source/conf.py
  # Fail on warnings to catch broken links and references
  fail_on_warning: false

# PDF/ePub disabled: 161-file LaTeX compilation exceeds RTD build timeout.
# Generate locally with: make latexpdf (in docs/)
formats: []

# Python configuration
python:
  install:
    # Install the project with docs extras only (excludes GUI/test/dev deps)
    - method: pip
      path: .
      extra_requirements:
        - docs
